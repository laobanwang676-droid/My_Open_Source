<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目演示视频</title>
  <style>
    :root {
      --bg: #0d1320;
      --text: #f7fbff;
      --muted: #b9c4d6;
      --line: rgba(255, 255, 255, 0.12);
      --primary: #3b82f6;
      --accent: #19c6a5;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 12%, rgba(25, 198, 165, 0.18), transparent 30%),
        radial-gradient(circle at 86% 4%, rgba(59, 130, 246, 0.22), transparent 32%),
        linear-gradient(180deg, #0b1020 0%, var(--bg) 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 52px;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .back-link:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.12);
    }

    .brand {
      font-weight: 800;
      color: var(--muted);
    }

    .intro {
      margin-bottom: 22px;
      text-align: center;
    }

    .intro p {
      margin: 0 0 10px;
      color: var(--accent);
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.85rem, 4vw, 3.4rem);
      line-height: 1.16;
      letter-spacing: 0;
    }

    .player {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #050813;
      box-shadow: var(--shadow);
    }

    video {
      display: block;
      width: 100%;
      max-height: min(72vh, 760px);
      background: #050813;
      aspect-ratio: 16 / 9;
    }

    .hint {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.7;
      text-align: center;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 8px;
      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-source {
      color: #06111f;
      background: #fff;
    }

    .btn-home {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 12px 26px rgba(59, 130, 246, 0.26);
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 1100px);
        padding-top: 18px;
      }

      .nav {
        align-items: flex-start;
        flex-direction: column-reverse;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <nav class="nav">
      <a class="back-link" href="index.html">返回首页</a>
      <a class="brand" href="index.html">小汪的开源网站</a>
    </nav>

    <section class="intro" aria-labelledby="video-title">
      <p>项目演示视频</p>
      <h1 id="video-title">基于Free RTOS的智能天气时钟</h1>
    </section>

    <section class="player" aria-label="视频播放器">
      <video id="project-video" controls playsinline preload="metadata">
        <source id="project-video-source" src="weather_clock.mp4" type="video/mp4" />
        当前浏览器无法播放这个视频，请确认视频为 H.264 编码的 MP4 文件。
      </video>
    </section>

    <p class="hint">如果在 GitHub 仓库文件页面无法播放，请通过 GitHub Pages 部署后访问网页。</p>

    <div class="actions">
      <a id="source-link" class="btn btn-source" href="https://github.com/laobanwang676-droid/HAL_stm32F4_RTOS_clock.git" target="_blank" rel="noopener noreferrer">查看源码</a>
      <a class="btn btn-home" href="index.html">返回项目列表</a>
    </div>
  </main>

  <script>
    const projects = {
      weather: {
        title: "基于Free RTOS的智能天气时钟",
        video: "weather_clock.mp4",
        source: "https://github.com/laobanwang676-droid/HAL_stm32F4_RTOS_clock.git"
      },
      balance: {
        title: "多模态两轮自平衡系统",
        video: "balance_car.mp4",
        source: "https://github.com/laobanwang676-droid/HAL_stm32f103c8t6_BCar.git"
      }
    };

    const params = new URLSearchParams(window.location.search);
    const projectKey = params.get("project") || "weather";
    const project = projects[projectKey] || projects.weather;
    const video = document.getElementById("project-video");
    const source = document.getElementById("project-video-source");

    document.title = `${project.title} - 项目演示视频`;
    document.getElementById("video-title").textContent = project.title;
    document.getElementById("source-link").href = project.source;
    source.src = project.video;
    video.load();
  </script>
</body>
</html>
