<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小汪的开源网站</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --text: #19202a;
      --muted: #647084;
      --line: #dfe5ee;
      --panel: rgba(255, 255, 255, 0.88);
      --primary: #1663d9;
      --primary-dark: #0d47a1;
      --accent: #12a98c;
      --ink: #101828;
      --shadow: 0 20px 55px rgba(28, 39, 60, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(18, 169, 140, 0.14), transparent 28%),
        radial-gradient(circle at 86% 8%, rgba(22, 99, 217, 0.13), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 42%, #eef3f7 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-shell {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 0 34px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 10px 24px rgba(22, 99, 217, 0.28);
    }

    .brand span:last-child {
      font-size: 1.02rem;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 0.92fr);
      gap: 32px;
      align-items: center;
      padding: 36px 0 48px;
    }

    .hero-copy {
      max-width: 680px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 18px;
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .eyebrow::before {
      content: "";
      width: 34px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.25rem, 5vw, 5rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .hero-subtitle {
      margin: 22px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.8;
    }

    .hero-media {
      position: relative;
      overflow: hidden;
      min-height: 360px;
      border: 1px solid rgba(18, 169, 140, 0.18);
      border-radius: 8px;
      background: #0e1726;
      box-shadow: var(--shadow);
    }

    .hero-media video {
      width: 100%;
      height: 100%;
      min-height: 360px;
      object-fit: cover;
      opacity: 0.78;
      filter: saturate(1.04) contrast(1.04);
    }

    .media-label {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(11, 18, 32, 0.72);
      backdrop-filter: blur(12px);
    }

    .media-label strong {
      font-size: 0.98rem;
    }

    .media-label span {
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.86rem;
    }

    .projects {
      padding-top: 8px;
    }

    .project-section {
      padding: 34px 0;
      border-top: 1px solid var(--line);
    }

    .project-section h2 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.55rem, 3vw, 2.25rem);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .project-summary {
      min-height: 34px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      margin-top: 12px;
    }

    .action-card {
      overflow: hidden;
      border: 1px solid rgba(100, 112, 132, 0.2);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 14px 38px rgba(28, 39, 60, 0.1);
    }

    .preview {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111827;
    }

    .preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.82;
      transition: transform 0.4s ease, opacity 0.4s ease;
    }

    .action-card:hover .preview video {
      transform: scale(1.035);
      opacity: 0.94;
    }

    .project-tag {
      position: absolute;
      left: 14px;
      bottom: 14px;
      max-width: calc(100% - 28px);
      padding: 8px 10px;
      color: #fff;
      border-radius: 8px;
      background: rgba(9, 15, 26, 0.72);
      backdrop-filter: blur(10px);
      font-weight: 700;
      font-size: 0.92rem;
      line-height: 1.35;
    }

    .card-body {
      padding: 20px;
    }

    .card-body h3 {
      margin: 0 0 16px;
      color: var(--ink);
      font-size: 1.08rem;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 8px;
      font-weight: 800;
      line-height: 1.2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-source {
      color: #fff;
      background: var(--ink);
      box-shadow: 0 10px 22px rgba(16, 24, 40, 0.18);
    }

    .btn-source:hover {
      background: #263244;
    }

    .btn-video {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 10px 22px rgba(22, 99, 217, 0.22);
    }

    footer {
      padding: 36px 0 0;
      color: var(--muted);
      border-top: 1px solid var(--line);
      font-size: 0.92rem;
    }

    @media (max-width: 840px) {
      .hero,
      .action-grid {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 20px;
      }

      .hero-media,
      .hero-media video {
        min-height: 270px;
      }
    }

    @media (max-width: 560px) {
      .site-shell {
        width: min(100% - 24px, 1120px);
        padding-top: 22px;
      }

      .topbar {
        padding-bottom: 20px;
      }

      .hero {
        gap: 22px;
      }

      .media-label,
      .button-row {
        grid-template-columns: 1fr;
      }

      .media-label {
        display: block;
      }

      .media-label span {
        display: block;
        margin-top: 4px;
      }

      .card-body {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="小汪的开源网站首页">
        <span class="brand-mark">汪</span>
        <span>小汪的开源网站</span>
      </a>
    </header>

    <section class="hero" aria-labelledby="site-title">
      <div class="hero-copy">
        <p class="eyebrow">Open Source Projects</p>
        <h1 id="site-title">小汪的开源网站</h1>
        <p class="hero-subtitle">
          这里整理展示小汪的开源项目、源码仓库和演示视频，方便快速了解每个项目的功能与运行效果。
        </p>
      </div>
      <div class="hero-media" aria-label="项目演示视频预览">
        <video src="weather_clock.mp4" muted autoplay loop playsinline preload="metadata"></video>
        <div class="media-label">
          <strong>Free RTOS 智能天气时钟</strong>
          <span>项目演示预览</span>
        </div>
      </div>
    </section>

    <section class="projects" aria-label="项目介绍">
      <article class="project-section">
        <h2>基于Free RTOS的智能天气时钟</h2>
        <p class="project-summary"></p>
      </article>

      <article class="project-section">
        <h2>多模态两轮自平衡系统</h2>
        <p class="project-summary"></p>
      </article>
    </section>

    <section class="action-grid" aria-label="项目源码和演示视频">
      <article class="action-card">
        <div class="preview">
          <video src="weather_clock.mp4" muted loop playsinline preload="metadata"></video>
          <span class="project-tag">Free RTOS智能天气时钟</span>
        </div>
        <div class="card-body">
          <h3>Free RTOS智能天气时钟</h3>
          <div class="button-row">
            <a class="btn btn-source" href="https://github.com/laobanwang676-droid/HAL_stm32F4_RTOS_clock.git" target="_blank" rel="noopener noreferrer">源码</a>
            <a class="btn btn-video" href="video.html?project=weather">演示视频</a>
          </div>
        </div>
      </article>

      <article class="action-card">
        <div class="preview">
          <video src="balance_car.mp4" muted loop playsinline preload="metadata"></video>
          <span class="project-tag">多模态两轮自平衡系统</span>
        </div>
        <div class="card-body">
          <h3>多模态两轮自平衡系统</h3>
          <div class="button-row">
            <a class="btn btn-source" href="https://github.com/laobanwang676-droid/HAL_stm32f103c8t6_BCar.git" target="_blank" rel="noopener noreferrer">源码</a>
            <a class="btn btn-video" href="video.html?project=balance">演示视频</a>
          </div>
        </div>
      </article>
    </section>

    <footer>
      <span>持续更新开源项目中。</span>
    </footer>
  </main>

  <script>
    document.querySelectorAll(".preview video").forEach((video) => {
      const card = video.closest(".action-card");
      card.addEventListener("mouseenter", () => video.play().catch(() => {}));
      card.addEventListener("mouseleave", () => {
        video.pause();
        video.currentTime = 0;
      });
    });
  </script>
</body>
</html>
