<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小汪的开源网站</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #172033;
      --muted: #647084;
      --line: #dfe6ef;
      --panel: rgba(255, 255, 255, 0.9);
      --primary: #1663d9;
      --primary-dark: #0d47a1;
      --accent: #12a98c;
      --ink: #101828;
      --shadow: 0 18px 46px rgba(28, 39, 60, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(18, 169, 140, 0.14), transparent 28%),
        radial-gradient(circle at 86% 6%, rgba(22, 99, 217, 0.13), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 48%, #eef3f7 100%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .site-shell {
      width: min(1120px, calc(100% - 36px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 0 42px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 12px;
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 10px 24px rgba(22, 99, 217, 0.28);
    }

    .brand span:last-child {
      font-size: 1.02rem;
    }

    .hero {
      display: flex;
      justify-content: center;
      padding: 44px 0 68px;
      text-align: center;
      border-bottom: 1px solid var(--line);
    }

    .hero-copy {
      width: min(820px, 100%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin: 0 0 18px;
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 34px;
      height: 2px;
      background: var(--accent);
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(2.35rem, 7vw, 5.6rem);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .hero-subtitle {
      margin: 22px auto 0;
      max-width: 680px;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.8;
    }

    .projects {
      padding-top: 12px;
    }

    .project-section {
      padding: 34px 0;
      border-bottom: 1px solid var(--line);
    }

    .project-section h2 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.55rem, 3vw, 2.25rem);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .project-summary {
      min-height: 34px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      margin-top: 32px;
    }

    .action-card {
      border: 1px solid rgba(100, 112, 132, 0.2);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 24px;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .action-card:hover {
      transform: translateY(-3px);
      border-color: rgba(22, 99, 217, 0.28);
      box-shadow: 0 24px 56px rgba(28, 39, 60, 0.15);
    }

    .card-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      color: var(--primary-dark);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .card-kicker::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(18, 169, 140, 0.12);
    }

    .card-body h3 {
      margin: 0 0 22px;
      color: var(--ink);
      font-size: 1.28rem;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 16px;
      border-radius: 8px;
      font-weight: 800;
      line-height: 1.2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-source {
      color: #fff;
      background: var(--ink);
      box-shadow: 0 10px 22px rgba(16, 24, 40, 0.18);
    }

    .btn-source:hover {
      background: #263244;
    }

    .btn-video {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 10px 22px rgba(22, 99, 217, 0.22);
    }

    footer {
      padding: 36px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 760px) {
      .action-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .site-shell {
        width: min(100% - 24px, 1120px);
        padding-top: 22px;
      }

      .topbar {
        padding-bottom: 24px;
      }

      .hero {
        padding: 34px 0 52px;
      }

      .button-row {
        grid-template-columns: 1fr;
      }

      .action-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="site-shell">
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="小汪的开源网站首页">
        <span class="brand-mark">汪</span>
        <span>小汪的开源网站</span>
      </a>
    </header>

    <section class="hero" aria-labelledby="site-title">
      <div class="hero-copy">
        <p class="eyebrow">Open Source Projects</p>
        <h1 id="site-title">小汪的开源网站</h1>
        <p class="hero-subtitle">
          这里整理展示小汪的开源项目、源码仓库和演示视频，方便快速了解每个项目的功能与运行效果。
        </p>
      </div>
    </section>

    <section class="projects" aria-label="项目介绍">
      <article class="project-section">
        <h2>基于Free RTOS的智能天气时钟</h2>
        <p class="project-summary"></p>
      </article>

      <article class="project-section">
        <h2>多模态两轮自平衡系统</h2>
        <p class="project-summary"></p>
      </article>
    </section>

    <section class="action-grid" aria-label="项目源码和演示视频">
      <article class="action-card">
        <div class="card-body">
          <span class="card-kicker">Free RTOS智能天气时钟</span>
          <h3>基于Free RTOS的智能天气时钟</h3>
          <div class="button-row">
            <a class="btn btn-source" href="https://github.com/laobanwang676-droid/HAL_stm32F4_RTOS_clock.git" target="_blank" rel="noopener noreferrer">源码</a>
            <a class="btn btn-video" href="video.html?project=weather">演示视频</a>
          </div>
        </div>
      </article>

      <article class="action-card">
        <div class="card-body">
          <span class="card-kicker">多模态两轮自平衡系统</span>
          <h3>多模态两轮自平衡系统</h3>
          <div class="button-row">
            <a class="btn btn-source" href="https://github.com/laobanwang676-droid/HAL_stm32f103c8t6_BCar.git" target="_blank" rel="noopener noreferrer">源码</a>
            <a class="btn btn-video" href="video.html?project=balance">演示视频</a>
          </div>
        </div>
      </article>
    </section>

    <footer>
      <span>持续更新开源项目中。</span>
    </footer>
  </main>
</body>
</html>
